<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイポグラフィポスタープロンプトジェネレーター</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem;
    background: #fff; color: #111;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 0.4rem; }
  p.sub { font-size: 13px; color: #888; margin: 0 0 1.75rem; }
  .section { margin-bottom: 1.25rem; }
  .label {
    display: block; font-size: 12px; color: #555;
    font-weight: 500; margin-bottom: 6px;
  }
  .label span { font-weight: 400; color: #aaa; }
  input[type="text"], textarea {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid #e0e0e0; border-radius: 8px;
    background: #fff; color: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #888; }
  textarea { min-height: 72px; resize: vertical; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; padding: 5px 14px;
    border-radius: 999px; font-size: 13px; cursor: pointer;
    border: 1px solid #ddd; background: #fff; color: #666;
    transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: #999; color: #111; }
  .chip.active { background: #111; color: #fff; border-color: #111; }
  .font-hint { margin: 8px 0 0; font-size: 12px; color: #aaa; min-height: 1.4em; }
  .gen-btn {
    margin-top: 1.5rem; padding: 11px 22px; font-size: 14px;
    font-weight: 500; cursor: pointer; border: none;
    border-radius: 8px; background: #111; color: #fff;
    font-family: inherit; transition: background 0.15s;
  }
  .gen-btn:hover { background: #333; }
  #output-area { display: none; margin-top: 1.75rem; }
  .output-label { font-size: 12px; color: #555; font-weight: 500; margin: 0 0 8px; }
  .output-label span { font-weight: 400; color: #aaa; }
  #output-box {
    background: #f7f7f7; border: 1px solid #e8e8e8; border-radius: 8px;
    padding: 1rem 1.25rem; font-size: 13px; line-height: 1.9; color: #222;
    white-space: pre-wrap; word-break: break-word;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .action-btn {
    font-size: 13px; padding: 7px 16px; cursor: pointer;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #111; font-family: inherit;
    transition: background 0.15s;
  }
  .action-btn:hover { background: #f4f4f4; }
</style>
</head>
<body>

<h1>タイポグラフィポスタープロンプトジェネレーター</h1>
<p class="sub">情報を入力してChatGPT用プロンプトを生成します</p>

<div class="section">
  <label class="label">あなたの名前 / ニックネーム</label>
  <input id="inp-name" type="text" />
</div>

<div class="section">
  <label class="label">キーワード <span>スペース区切り</span></label>
  <textarea id="inp-keywords"></textarea>
</div>

<div class="section">
  <label class="label">テイスト <span>1つ選択</span></label>
  <div class="chip-group" id="taste-grid"></div>
  <p class="font-hint" id="font-hint"></p>
</div>

<div class="section">
  <label class="label">使いたい色 <span>スペース区切り</span></label>
  <input id="inp-color" type="text" />
</div>

<button class="gen-btn" onclick="generate()">プロンプトを生成する ↗</button>

<div id="output-area">
  <p class="output-label">生成されたプロンプト <span>— ChatGPTにそのまま貼り付けてください</span></p>
  <div id="output-box"></div>
  <div class="btn-row">
    <button class="action-btn" onclick="copyText(event)">コピー</button>
    <button class="action-btn" onclick="window.open('https://chatgpt.com/', '_blank')">ChatGPTを開く</button>
  </div>
</div>

<script>
const NAME_SIZE = `The name "NAME" should be set at a medium size — large enough to be clearly readable and noticeable as a personal identifier, but not the largest element on the canvas (roughly 1/5 of the canvas width). It should feel like a confident title card within the composition, balanced among the surrounding keywords.`;

const KW_LAYOUT = `- Arrange all keywords randomly across the full canvas with no alignment or grid
- For each keyword, independently and randomly assign one of three text directions:
  (1) Horizontal (yokogumi) — standard left-to-right
  (2) Vertical (tategumi) — strict top-to-bottom, NO rotation or diagonal tilt whatsoever; vertical text must remain perfectly upright
  (3) Diagonal — rotated at a free angle between -45° and +45° for horizontal-origin words only; never apply diagonal rotation to vertical tategumi text
  Distribute all three directions roughly equally and unpredictably so that horizontal, vertical, and diagonal words appear mixed together throughout every area of the canvas
- Within a single keyword, vary the size of individual characters: for example, make the first character very large, the second tiny, the third medium — creating an internal rhythm of size contrast inside each word itself, not just between different words
- Apply a very strong jump rate across all keywords: use at least 4 clearly distinct size levels — enormous, large, medium, and tiny — so the overall size difference is dramatic
- Distribute size levels randomly across the entire canvas; mix enormous and tiny words in the same area`;

const tastes = [
  {
    label: "ナチュラル",
    val: "natural, organic, calm and earthy",
    fontJa: "手書き風・丸ゴシック・やわらかいゴシック",
    fontEn: "handwritten-style fonts, rounded gothic (e.g. Zen Maru Gothic), and soft sans-serif fonts — warm, approachable, and organic in feel",
    bgEn: "Use a very subtle off-white or warm ivory background (#FAF7F2 or similar), optionally with an extremely faint paper-grain texture. The background should feel like natural unbleached paper — quiet and warm, never stark white.",
    designEn: `- NAME_PLACEHOLDER Write it in a soft handwritten or rounded font, placed naturally among the other words.
- KW_PLACEHOLDER
- Use a warm, muted color palette with soft contrast; avoid harsh blacks — prefer deep browns or dusty tones
- Overall feel: airy and organic despite the dynamic mixed-direction layout, like a hand-crafted nature journal`
  },
  {
    label: "ガーリー",
    val: "girly, feminine, romantic and stylish",
    fontJa: "丸ゴシック・ポップ体・かわいい系フォント",
    fontEn: "rounded gothic fonts, script and handwritten display fonts, and elegant-cute mixed typefaces — feminine, charming, and fashion-forward",
    bgEn: "Use a very pale blush or soft lavender background (e.g. #FDF0F3 or #F5F0FA), delicate enough to feel like high-quality stationery. Optionally add a barely-visible fine dot grid pattern for a notebook aesthetic. The background should enhance femininity without competing with the text.",
    designEn: `- NAME_PLACEHOLDER Set it in a stylish script or rounded font with a romantic, fashion-magazine feel.
- KW_PLACEHOLDER
- Mix delicate thin fonts with slightly bolder accent words for chic contrast
- Use pastel tones, blush pinks, lavender, or rose gold accents
- Scatter small decorative symbols (✳ † ✿) randomly among the keywords as typographic ornaments
- Overall feel: a playful fashion lookbook where vertical, horizontal, and diagonal words collide unexpectedly — sweet but stylish`
  },
  {
    label: "ポップ",
    val: "pop, colorful, bold and energetic",
    fontJa: "極太ゴシック・ポップ体・デザイン書体",
    fontEn: "extra-bold gothic fonts, pop display fonts, and expressive design typefaces — loud, punchy, and high-impact",
    bgEn: "Use a clean, pure white (#FFFFFF) background to maximize contrast with the bold, saturated typography. Alternatively, a single vivid solid color block (matching one of the palette colors) can be used as a full-bleed background for extra pop energy. Keep it flat and graphic — no gradients or textures.",
    designEn: `- NAME_PLACEHOLDER Set it in an ultra-bold font as a confident anchor amid the energetic surrounding text.
- KW_PLACEHOLDER
- Apply strong, saturated color fills to individual letters or words; use color blocking freely
- The collision of vertical Japanese words, diagonal Latin text, and varied internal character sizes should feel intentional and high-energy
- Overall feel: a chaotic-yet-designed concert poster where direction, scale, and internal size contrast create maximum visual tension`
  },
  {
    label: "エレガント",
    val: "elegant, refined, luxurious",
    fontJa: "明朝体・細字フォント・クラシック体",
    fontEn: "mincho (Japanese serif) fonts, thin-weight typefaces, and classic serif fonts — graceful, refined, and timeless",
    bgEn: "Use a deep, rich background such as a near-black charcoal (#1A1A1A), a dark navy, or a very pale ivory (#FDFAF5) — choose based on the palette. If dark, let the typography glow against it in gold, ivory, or soft white. If light, keep the background almost imperceptibly warm. Either way, the background must feel premium and editorial.",
    designEn: `- NAME_PLACEHOLDER Set it in a delicate thin-weight mincho or serif font with generous letter-spacing, placed with quiet confidence.
- KW_PLACEHOLDER
- Despite the random mixed-direction layout, maintain elegance through generous negative space and restrained color
- The internal size variation within a single word should feel like a deliberate calligraphic choice, not chaos
- Limit the color palette to two or three tones; gold, ivory, or deep navy as accents`
  },
  {
    label: "レトロ",
    val: "retro, vintage, nostalgic",
    fontJa: "レトロフォント・タイプライター風・ヴィンテージ系",
    fontEn: "retro-style fonts, typewriter-inspired typefaces, and vintage display fonts — aged, characterful, and nostalgic",
    bgEn: "Use an aged, warm background that evokes old paper — a muted sepia tone (#F2E8D5), a worn cream, or a faded manila color. Apply a subtle noise or grain texture to simulate aging. The background should look like a page torn from a vintage magazine or old notebook, never crisp or digital.",
    designEn: `- NAME_PLACEHOLDER Set it in a typewriter or vintage display font, styled like a confident byline.
- KW_PLACEHOLDER
- The mix of vertical Japanese tategumi, diagonal Latin, and horizontal typewriter text should evoke a vintage collage or cut-and-paste zine
- Internal character size variation within a word should feel like mismatched vintage type blocks — characterful and nostalgic
- Incorporate ornamental dividers, all-caps headlines, and condensed type scattered randomly among the keywords
- Use sepia, faded cream, or aged tones; avoid pure white or pure black`
  },
];

function makeChips(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.label;
    chip.dataset.val = item.val;
    chip.dataset.fontJa = item.fontJa;
    chip.dataset.fontEn = item.fontEn;
    chip.dataset.bgEn = item.bgEn;
    chip.dataset.designEn = item.designEn;
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.getElementById('font-hint').textContent = '使用フォントの方向性：' + item.fontJa;
    };
    el.appendChild(chip);
  });
}

makeChips('taste-grid', tastes);

let lastPrompt = '';

function buildDesignEn(rawDesignEn, name) {
  const nameStr = NAME_SIZE.replace('NAME', name);
  return rawDesignEn
    .replace('NAME_PLACEHOLDER', nameStr)
    .replace('KW_PLACEHOLDER', KW_LAYOUT);
}

function generate() {
  const name = document.getElementById('inp-name').value.trim() || 'me';
  const rawKw = document.getElementById('inp-keywords').value.trim();
  const rawColor = document.getElementById('inp-color').value.trim();

  const kwList = rawKw ? rawKw.split(/\s+/).filter(Boolean) : ['design', 'my interests'];
  const colorList = rawColor ? rawColor.split(/\s+/).filter(Boolean) : [];

  const tasteChip = document.querySelector('#taste-grid .chip.active');
  const tasteVal = tasteChip ? tasteChip.dataset.val : 'stylish and modern';
  const fontEn = tasteChip ? tasteChip.dataset.fontEn : 'a tasteful mix of Japanese and Latin fonts';
  const bgEn = tasteChip ? tasteChip.dataset.bgEn : 'Use a clean, simple background that does not distract from the typography.';
  const designEn = tasteChip
    ? buildDesignEn(tasteChip.dataset.designEn, name)
    : `- Feature the name "${name}" at a medium size — confident but not dominant.\n- Scatter keywords with vertical (strictly upright), horizontal, and diagonal directions mixed randomly.\n- Vary individual character sizes within each word for internal rhythm.`;
  const colorStr = colorList.length ? colorList.join(', ') : 'colors that match the overall style';

  lastPrompt = `Generate an image of a personal introduction typography poster with the following specifications.

[Name]
${name}

[Size]
960px × 1280px (vertical / portrait)

[Style & Mood]
${tasteVal}

[Color Palette]
${colorStr}

[Background]
${bgEn}

[Font Direction (Japanese + Latin mix)]
Use ${fontEn}. Mix Japanese and Latin typefaces to create a rich typographic contrast that suits the overall mood.

[Keywords to include]
${kwList.join(', ')}

[Design Direction]
- No photos or human figures — text only
- Fill the entire canvas with all the keywords above
${designEn}
- Subtly vary the color of keyword groups where it improves readability
- Select 2 to 3 keywords that best represent the person's personality or interests, and pair each with a short, punchy catchphrase (3 to 6 words) that evokes the essence of that keyword — place these catchphrases as small accent text near the keyword, styled differently (e.g. italic, lighter weight, or a contrasting font) to add depth and an editorial feel without cluttering the layout`;

  document.getElementById('output-box').textContent = lastPrompt;
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyText(e) {
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const btn = e.target.closest('button');
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>

</body>
</html>
