<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイポグラフィポスタープロンプトジェネレーター</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 2rem 1rem; background: #fff; color: #111; }
  h1 { font-size: 16px; margin: 0 0 0.5rem; }
  p.sub { font-size: 13px; color: #666; margin: 0 0 1.5rem; }
  .section { margin-bottom: 1.25rem; }
  label { display: block; font-size: 12px; color: #666; font-weight: 500; margin-bottom: 6px; }
  label span { font-weight: 400; color: #999; }
  input[type="text"], textarea {
    width: 100%; padding: 8px 12px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #111; font-family: sans-serif;
  }
  textarea { min-height: 72px; resize: vertical; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; padding: 5px 14px;
    border-radius: 999px; font-size: 13px; cursor: pointer;
    border: 1px solid #ddd; background: #fff; color: #666;
    transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: #999; color: #111; }
  .chip.active { background: #111; color: #fff; border-color: #111; }
  .font-hint { margin: 8px 0 0; font-size: 12px; color: #999; min-height: 1.4em; }
  .btn-row { display: flex; gap: 8px; margin-top: 1.5rem; flex-wrap: wrap; }
  button.gen {
    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    border: 1px solid #111; border-radius: 8px; background: #111; color: #fff;
  }
  button.gen:hover { background: #333; }
  button.reset {
    padding: 10px 20px; font-size: 14px; font-weight: 400; cursor: pointer;
    border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666;
  }
  button.reset:hover { background: #f5f5f5; }
  #output-area { display: none; margin-top: 1.5rem; }
  #output-area > p { font-size: 12px; color: #666; font-weight: 500; margin: 0 0 8px; }
  #output-box {
    background: #f7f7f7; border: 1px solid #ddd; border-radius: 8px;
    padding: 1rem 1.25rem; font-size: 13px; line-height: 1.9;
    white-space: pre-wrap; word-break: break-word;
  }
  .action-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  button.action {
    font-size: 13px; padding: 7px 16px; cursor: pointer;
    border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111;
  }
  button.action:hover { background: #f0f0f0; }
</style>
</head>
<body>

<h1>タイポグラフィポスタープロンプトジェネレーター</h1>
<p class="sub">情報を入力してChatGPT用プロンプトを生成します</p>

<div class="section">
  <label>あなたの名前 / ニックネーム</label>
  <input id="inp-name" type="text" />
</div>

<div class="section">
  <label>キーワード <span>スペース区切り</span></label>
  <textarea id="inp-keywords"></textarea>
</div>

<div class="section">
  <label>テイスト <span>1つ選択</span></label>
  <div class="chip-group" id="taste-grid"></div>
  <p class="font-hint" id="font-hint"></p>
</div>

<div class="section">
  <label>使いたい色 <span>スペース区切り</span></label>
  <input id="inp-color" type="text" />
</div>

<div class="btn-row">
  <button class="gen" onclick="generate()">プロンプトを生成する ↗</button>
  <button class="reset" onclick="resetAll()">リセット</button>
</div>

<div id="output-area">
  <p>生成されたプロンプト — <span style="font-weight:400;">ChatGPTにそのまま貼り付けてください</span></p>
  <div id="output-box"></div>
  <div class="action-row">
    <button class="action" onclick="copyText(event)">コピー</button>
    <button class="action" onclick="window.open('https://chatgpt.com/', '_blank')">ChatGPTを開く</button>
  </div>
</div>

<script>
const tastes = [
  {
    label: "ナチュラル",
    val: "natural, organic, calm and earthy",
    fontJa: "手書き風・丸ゴシック・やわらかいゴシック",
    fontEn: "handwritten-style fonts, rounded gothic (e.g. Zen Maru Gothic), and soft sans-serif — warm, approachable, organic",
    bgEn: "Warm ivory or unbleached paper tone (#FAF7F2). Optionally a barely-visible paper-grain texture. Never stark white.",
    referenceEn: "Botanical art book, handmade ZINE, Scandinavian lifestyle magazine — where type feels grown rather than placed.",
    layoutEn: `- Let words drift and meander organically — as if hand-placed on a nature journal page, not snapped to any grid
- Horizontal words dominate (roughly 50%), with vertical tategumi words (30%) woven in as quiet vertical stems, and a few gently diagonal words (20%) adding soft movement — no sharp angles
- Within each keyword, vary individual character sizes gently: a subtle swell and shrink, like brush strokes of uneven pressure
- Overall density: airy — leave generous breathing room between words; do not pack the canvas tightly`,
    colorEn: `- Primary text: deep warm brown or charcoal (#3B2F2F or similar) — never pure black
- Accent color 1: dusty sage green (#8A9E7A) for 2–3 keywords
- Accent color 2: terracotta or rust (#C16A4F) for 1–2 keywords
- Remaining keywords: warm cream or off-white tones
- No bright or saturated colors; everything should feel sun-faded and handmade`
  },
  {
    label: "ガーリー",
    val: "girly, feminine, romantic and stylish",
    fontJa: "丸ゴシック・スクリプト体・かわいい系フォント",
    fontEn: "rounded gothic, script and handwritten display fonts, elegant-cute mixed typefaces — feminine, charming, fashion-forward",
    bgEn: "Very pale blush (#FDF0F3) or soft lavender (#F5F0FA). Optionally a barely-visible fine dot grid for a stationery feel.",
    referenceEn: "Korean women's fashion magazine, Parisian SNS aesthetic, personal lookbook — type as decoration, not just information.",
    layoutEn: `- Layout feels curated-random: words scattered freely but with an unconscious sense of visual balance, like a mood board pinned by instinct
- Mix horizontal (40%), vertical tategumi (30%), and diagonal (30%) — diagonal words should feel like they are leaning playfully, not falling
- Within each keyword, create gentle internal size contrast: first character slightly larger, others smaller, like a stylish drop cap effect
- Scatter typographic ornaments (✳ ✿ † ◇) freely between words as breathing elements
- Overall density: medium — words overlap softly at edges, like overlapping polaroids`,
    colorEn: `- Primary text: deep rose or muted mauve (#8C4A5A) — warm and feminine, not aggressive
- Accent color 1: blush pink (#E8A0A8) for large display words
- Accent color 2: soft lavender (#B8A9D4) for 2–3 keywords
- Accent color 3: pale gold (#D4AF7A) for ornaments and catchphrases
- Background should show through generously — color is used as a highlight, not a fill`
  },
  {
    label: "ポップ",
    val: "pop, colorful, bold and energetic",
    fontJa: "極太ゴシック・ポップ体・デザイン書体",
    fontEn: "extra-bold gothic, pop display fonts, expressive design typefaces — loud, punchy, high-impact",
    bgEn: "Pure white (#FFFFFF) for maximum contrast, or one vivid solid color from the palette as a full-bleed flat background. No gradients or textures.",
    referenceEn: "90s street flyer, Harajuku fashion zine, Tokyo concert poster — type as visual noise that somehow works.",
    layoutEn: `- Maximum chaos: words collide, overlap, and crash into each other aggressively — no personal space between words
- Roughly equal mix of horizontal (35%), vertical tategumi (35%), and diagonal (30%) — diagonals can be steep (up to ±60°)
- Within each keyword, apply dramatic internal size contrast: one character enormous, the next tiny, the next large — like a ransom note cut from different magazines
- Some words can be outlined only (no fill), others solid fill, others with a drop shadow — vary the treatment per word
- Overall density: maximum — the canvas should feel like it is bursting`,
    colorEn: `- Use 4–5 saturated, clashing colors simultaneously — do not harmonize them
- Primary colors: vivid red (#FF2D2D), electric blue (#0057FF), bright yellow (#FFE600)
- Secondary colors: hot pink (#FF4DA6), lime green (#39FF14) — use at least 2 of these
- Apply colors per word or even per character — adjacent words should often clash in color
- Black outlines or white outlines on some words to separate clashing colors`
  },
  {
    label: "エレガント",
    val: "elegant, refined, luxurious",
    fontJa: "明朝体・細字フォント・クラシック体",
    fontEn: "mincho (Japanese serif), thin-weight typefaces, classic serif fonts — graceful, refined, timeless",
    bgEn: "Near-black charcoal (#1A1A1A) or very pale warm ivory (#FDFAF5). If dark: typography glows in gold/ivory. If light: restrained and airy. Must feel premium.",
    referenceEn: "High-fashion lookbook (Celine, The Row), architectural magazine, contemporary art exhibition poster — silence is part of the design.",
    layoutEn: `- Restrained and deliberate: words are placed with intention, not scattered randomly — imagine a typesetter who considered each placement
- Vertical tategumi words dominate (50%) as classical structural columns; horizontal words (35%) provide editorial contrast; minimal diagonal (15%) used only for Latin accents
- Within each keyword, apply subtle internal size variation: a single character set slightly larger as a refined typographic accent — think calligraphy, not randomness
- Generous negative space everywhere — words should never feel crowded; the canvas breathes
- Overall density: sparse to medium — what is NOT there is as important as what is`,
    colorEn: `- If dark background: primary text in warm ivory (#F5F0E8); accent in gold (#C9A84C) for 2–3 key words; one word in soft white (#FFFFFF)
- If light background: primary text in deep charcoal (#1A1A1A); accent in dark navy (#1B2A4A) or antique gold (#9A7B3A)
- Maximum 3 colors total — restraint is elegance
- Catchphrases in italics, set in the accent color, significantly smaller than surrounding words`
  },
  {
    label: "レトロ",
    val: "retro, vintage, nostalgic",
    fontJa: "レトロフォント・タイプライター風・ヴィンテージ系",
    fontEn: "retro display fonts, typewriter-inspired typefaces, vintage condensed fonts — aged, characterful, nostalgic",
    bgEn: "Aged warm paper tone (#F2E8D5 sepia, worn cream, or faded manila). Apply subtle noise/grain texture to simulate aging. Never crisp or digital-looking.",
    referenceEn: "Showa-era Japanese weekly magazine, vintage Americana poster, hand-typed zine — type with a history, like it was found not made.",
    layoutEn: `- Evoke a cut-and-paste collage: some words feel like clippings pasted at angles, others like rubber stamps pressed unevenly
- Mix horizontal (40%) mimicking typewriter lines, vertical tategumi (35%) echoing old newspaper columns, and diagonal (25%) suggesting torn and re-pasted clippings
- Within each keyword, apply mismatched internal sizing: as if each character was set with a different type block from a vintage letterpress drawer — irregular and characterful
- Include text-based ornamental elements: horizontal rules (———), asterisks, brackets [  ], ALL CAPS section labels, and condensed filler text scattered as layout elements
- Overall density: packed — like a page with no wasted space, in the style of old print layouts`,
    colorEn: `- Primary text: dark sepia brown (#3D2B1F) or aged black (#2C2416)
- Accent color 1: vermillion or brick red (#B33A2A) for headline-level words — like a rubber stamp
- Accent color 2: mustard yellow (#C9A84C) for 1–2 keywords
- Accent color 3: faded teal or olive (#5C7A6A) as a subtle third tone
- All colors should look slightly faded or desaturated — as if aged by sunlight`
  },
];

function makeChips(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.label;
    Object.keys(item).forEach(k => { chip.dataset[k] = item[k]; });
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.getElementById('font-hint').textContent = '使用フォントの方向性：' + item.fontJa;
    };
    el.appendChild(chip);
  });
}

makeChips('taste-grid', tastes);

let lastPrompt = '';

function resetAll() {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-keywords').value = '';
  document.getElementById('inp-color').value = '';
  document.querySelectorAll('#taste-grid .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('font-hint').textContent = '';
  document.getElementById('output-area').style.display = 'none';
  document.getElementById('output-box').textContent = '';
  lastPrompt = '';
}

function generate() {
  const name = document.getElementById('inp-name').value.trim() || 'me';
  const rawKw = document.getElementById('inp-keywords').value.trim();
  const rawColor = document.getElementById('inp-color').value.trim();

  const kwList = rawKw ? rawKw.split(/\s+/).filter(Boolean) : ['design', 'my interests'];
  const colorList = rawColor ? rawColor.split(/\s+/).filter(Boolean) : [];

  const tc = document.querySelector('#taste-grid .chip.active');
  if (!tc) { alert('テイストを選択してください'); return; }

  const userColorNote = colorList.length
    ? `The user has requested these colors be incorporated: ${colorList.join(', ')}. Blend them into the color scheme below while keeping the overall mood intact.`
    : '';

  lastPrompt = `Generate an image of a personal introduction typography poster with the following specifications.

[Name]
${name}

[Size]
960px × 1280px (vertical / portrait)

[Style & Mood]
${tc.dataset.val}

[Visual Reference]
Design this poster in the spirit of: ${tc.dataset.referenceEn}

[Background]
${tc.dataset.bgEn}

[Font Direction (Japanese + Latin mix)]
Use ${tc.dataset.fontEn}. Mix Japanese and Latin typefaces for rich typographic contrast suited to this mood.

[Keywords to include]
${kwList.join(', ')}

[Layout & Text Direction]
${tc.dataset.layoutEn}

[Color Rules]
${tc.dataset.colorEn}
${userColorNote}

[Name Placement]
The name "${name}" should be set at a medium size (roughly 1/5 of canvas width) — clearly readable and personally identifiable, but not the single largest element. It should feel like a confident signature woven into the composition.

[Catchphrases]
Select 2 to 3 keywords that best represent the person's character or interests. Pair each with a short punchy catchphrase (3–6 words) that captures the essence of that keyword. Place each catchphrase as small accent text beside its keyword, styled differently (italic, lighter weight, or contrasting font) for editorial depth without cluttering the layout.

[Final Note]
- No photos or human figures — typography only
- Every keyword in the list must appear somewhere in the composition`;

  document.getElementById('output-box').textContent = lastPrompt;
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyText(e) {
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const btn = e.target.closest('button');
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>

</body>
</html>
