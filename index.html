<html lang="ja">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  max-width: 660px; margin: 0 auto; padding: 2rem 1.25rem;
  background: #fff; color: #111;
}
h1 { font-size: 16px; font-weight: 500; margin: 0 0 0.4rem; }
p.sub { font-size: 13px; color: #888; margin: 0 0 1.75rem; }
.section { margin-bottom: 1.25rem; }
.label {
  display: block; font-size: 12px; color: #555;
  font-weight: 500; margin-bottom: 6px;
}
.label span { font-weight: 400; color: #aaa; }
input[type="text"], textarea {
  width: 100%; padding: 9px 12px; font-size: 14px;
  border: 1px solid #e0e0e0; border-radius: 8px;
  background: #fff; color: #111;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  outline: none; transition: border-color 0.15s;
}
input[type="text"]:focus, textarea:focus { border-color: #888; }
textarea { min-height: 72px; resize: vertical; }
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; padding: 5px 14px;
  border-radius: 999px; font-size: 13px; cursor: pointer;
  border: 1px solid #ddd; background: #fff; color: #666;
  transition: all 0.15s; user-select: none;
}
.chip:hover { border-color: #999; color: #111; }
.chip.active { background: #111; color: #fff; border-color: #111; }
.gen-btn-row { display: flex; gap: 8px; margin-top: 1.5rem; flex-wrap: wrap; }
.gen-btn {
  padding: 11px 22px; font-size: 14px;
  font-weight: 500; cursor: pointer; border: none;
  border-radius: 8px; background: #111; color: #fff;
  font-family: inherit; transition: background 0.15s;
}
.gen-btn:hover { background: #333; }
.reset-btn {
  padding: 11px 18px; font-size: 14px;
  font-weight: 500; cursor: pointer;
  border: 1px solid #ddd; border-radius: 8px;
  background: #fff; color: #555;
  font-family: inherit; transition: all 0.15s;
}
.reset-btn:hover { border-color: #999; color: #111; background: #f9f9f9; }
#output-area { display: none; margin-top: 1.75rem; }
.output-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.output-label { font-size: 12px; color: #555; font-weight: 500; margin: 0; }
.output-label span { font-weight: 400; color: #aaa; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
#output-box {
  background: #f7f7f7; border: 1px solid #e8e8e8; border-radius: 8px;
  padding: 1rem 1.25rem; font-size: 13px; line-height: 1.9; color: #222;
  white-space: pre-wrap; word-break: break-word;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
}
.action-btn {
  font-size: 13px; padding: 7px 16px; cursor: pointer;
  border: 1px solid #ddd; border-radius: 8px;
  background: #fff; color: #111; font-family: inherit;
  transition: background 0.15s;
}
.action-btn:hover { background: #f4f4f4; }
.section-divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.5rem 0; }
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  color: #bbb; text-transform: uppercase; margin: 0 0 1rem;
}
#kw-preview {
  display: none; margin-top: 1rem;
  border-radius: 10px; overflow: hidden;
  min-height: 80px; padding: 18px 20px;
  position: relative;
  transition: background 0.4s, border-color 0.4s;
  border: 1px solid #e8e8e8;
}
#kw-preview-inner {
  display: flex; flex-wrap: wrap; gap: 8px 12px;
  align-items: baseline; position: relative; z-index: 1;
}
.kw-token {
  display: inline-block; line-height: 1.2;
  transition: all 0.3s; cursor: default;
}
</style>
</head>
<body>

<h1>タイポグラフィポスタープロンプトジェネレーター</h1>
<p class="sub">入力情報をもとにDALL-E向けの詳細プロンプトを生成します</p>

<p class="section-title">基本情報</p>

<div class="section">
  <label class="label">あなたの名前 / ニックネーム</label>
  <input id="inp-name" type="text" />
</div>

<div class="section">
  <label class="label">キーワード <span>スペース区切り・5〜15個推奨</span></label>
  <textarea id="inp-keywords" oninput="updatePreview()"></textarea>
  <div id="kw-preview"><div id="kw-preview-inner"></div></div>
</div>

<hr class="section-divider">
<p class="section-title">スタイル</p>

<div class="section">
  <label class="label">テイスト <span>1つ選択</span></label>
  <div class="chip-group" id="taste-grid"></div>
</div>

<div class="section">
  <label class="label">使いたい色 <span>スペース区切り・色名やカラーコードも可</span></label>
  <input id="inp-color" type="text" />
</div>

<div class="gen-btn-row">
  <button class="gen-btn" onclick="generate()">プロンプトを生成する ↗</button>
  <button class="reset-btn" onclick="resetAll()">リセット</button>
</div>

<div id="output-area">
  <div class="output-header">
    <p class="output-label">生成されたプロンプト <span>— ChatGPT (DALL-E) にそのまま貼り付けてください</span></p>
    <div class="btn-row">
      <button class="action-btn" onclick="copyText(event)">コピー</button>
      <button class="action-btn" onclick="window.open('https://chatgpt.com/','_blank')">ChatGPTを開く ↗</button>
    </div>
  </div>
  <div id="output-box"></div>
</div>

<script>
// ─── 定数ブロック ──────────────────────────────────────────────

const SIZE_PRESETS = {
  portrait: { px: '960 × 1280 px', ratio: '3:4 portrait' }
};

const DENSITY_INSTRUCTIONS = {
  dense: 'Pack keywords tightly so almost no canvas area is empty. Overlapping or very close placement is acceptable and encouraged.'
};

const CONTRAST_INSTRUCTIONS = {
  extreme: 'Use at least five drastically different size levels — enormous (headline-scale), large, medium, small, and micro (nearly illegible). The largest element should be at least 10× taller than the smallest. Push contrast to the limit.'
};

const NAME_BLOCK = (name) =>
`[Name treatment]
The name "${name}" is the personal identifier of the poster owner:
- Set "${name}" at a medium-prominent size (roughly 1/5 of the canvas width).
- Place it at a natural anchor point (e.g. upper-left, lower-right, or center-stage).
- Let nearby keywords slightly overlap or orbit around it for integration.`;

const LAYOUT_BLOCK = () =>
`[Layout & composition rules]
${DENSITY_INSTRUCTIONS.dense}

Text direction — three modes, distributed unpredictably:
  (A) Horizontal (yokogumi): standard left-to-right.
  (B) Vertical (tategumi): strict top-to-bottom column — no rotation, no diagonal tilt. Each character stacks directly below the previous.
  (C) Diagonal: rotated freely between −50° and +50° for horizontal-origin words only. NEVER apply diagonal rotation to a word set in tategumi.
Mix all three directions. No single direction should dominate more than 40% of the keywords.

Internal character size variation (MANDATORY for every keyword of 2+ characters):
Within every multi-character keyword, independently vary the font size of EACH individual character:
  - Assign each character one of four size tiers: enormous (150–200%), large (110–140%), small (60–80%), or micro (30–50%).
  - No two adjacent characters should share the same tier.
  - This per-character variation stacks on top of the global word-level size contrast.

Global size contrast:
${CONTRAST_INSTRUCTIONS.extreme}
Distribute size levels randomly — do not cluster all large words at center.

Collision and layering:
Allow keywords to overlap slightly at edges. Use z-ordering so smaller words appear to slip behind larger ones. No word should be completely obscured.`;

function CATCHPHRASE_BLOCK(kwList) {
  const count = Math.max(1, Math.round(kwList.length * 0.4));
  const noCount = kwList.length - count;
  return `[Catchphrase accents — STRICT 40% RULE]
CRITICAL QUANTITY RULE: Select EXACTLY ${count} keyword${count > 1 ? 's' : ''} (40% of the total ${kwList.length}) to receive a catchphrase. The remaining ${noCount} keyword${noCount !== 1 ? 's' : ''} must appear as standalone typographic elements with NO catchphrase attached — not even a short one. This ratio is non-negotiable.

CRITICAL LANGUAGE RULE: Every catchphrase MUST be written entirely in Japanese (hiragana, katakana, and/or kanji ONLY). Any English letters or romaji in a catchphrase is strictly forbidden.

For each of the ${count} selected keywords, compose a short Japanese catchphrase (8〜16文字):
  - 詩的な一言: 短く詩的な表現（例：「静かに、でも確かに」）
  - 座右の銘風: 信念を表すフレーズ（例：「丁寧に生きる」）
  - 編集的キャプション: 雑誌の見出し風（例：「感性という名の羅針盤」）

Placement: small accent text (55–65% the size of its paired keyword), positioned directly beside or below it, in a contrasting font weight (extra-light or a mincho caption next to a bold gothic headline).

REMINDER: The other ${noCount} keyword${noCount !== 1 ? 's' : ''} must stand completely alone — no catchphrase, no sub-text of any kind.`;
}

// ─── テイストデータ ────────────────────────────────────────────

const tastes = [

Fonts (use ONLY these four):
  • Japanese primary: "Zen Maru Gothic" Light/Regular — rounded gothic, workhorse of the composition.
  • Japanese accent: "Hachi Maru Pop" — playful balloon-round, small-to-medium sizes only.
  • Latin primary: "Caveat" Regular/Bold — informal handwritten script, diagonal words.
  • Latin accent: "Lato" Light — humanist sans for catchphrases.
Weight range: Light to Regular only. Letter-spacing: +0.02em to +0.05em on Lato Light.

[Text effects — Natural / Organic]
Apply these effects to the typographic elements to reinforce the handcrafted, organic feel:

① Ink-bleed softening: All text edges are very slightly softened (0.3–0.5px blur), as if ink has soaked 1–2 fibers into the paper surface. This is NOT a glow — it is a matte, directional ink absorption. Apply more strongly to Caveat and Hachi Maru Pop; keep Zen Maru Gothic and Lato nearly crisp.

② Stroke-pressure variation (Caveat and Hachi Maru Pop only): Simulate natural brush/pen pressure — strokes that feel thicker at entry and exit, thinner mid-stroke. Achieved by rendering glyphs with slightly uneven stroke weight, as if painted with a soft brush.

③ Gentle organic warp: Large keywords (Zen Maru Gothic and Caveat at display sizes) have an extremely subtle baseline warp — individual characters shifted ±1–2px vertically at random, as if hand-set on an uneven surface. Not a wave — a slight organic irregularity.

④ Matte ink texture on fill: All text fill colors have a very fine grain texture (noise at 8–12% opacity) overlaid on the color itself, making the ink feel pigment-dense and matte rather than digital-flat. Apply to every keyword regardless of color.

⑤ Faded-edge characters: 2–3 keywords (the smallest or most lightly-weighted ones) have their outer edges very slightly faded, as if the ink was running low — opacity drops to 70–80% at the outermost strokes only. Creates the illusion of a worn stamp or near-dry brush.`,
    bgBlock: `[Background — Natural / Organic]

  Layer 1 — Base wash: solid fill with the ivory/linen tone.
  Layer 2 — Paper grain: fine irregular noise at 7–10% opacity, dense enough to feel tactile.
  Layer 3 — Cross-grain: a second noise pass rotated 45°, 4–6% opacity, creating subtle woven texture depth.
  Layer 4 — Moisture bleed zones: 3–4 irregular cloud-edged patches in a slightly deeper tone (#E8DDD0), 180–350px across, placed at two corners and one edge at 14–20% opacity. Edges must be completely feathered — zero hard boundary.
  Layer 5 — Botanical ghost: one very large abstract smudge (400–600px) resembling a dried pressed leaf, rendered as a tonal shift of the base at 6–10% opacity, placed off-center.

    designBlock: `[Design direction — Natural]

Typographic embellishments (text and symbol elements ONLY — no drawn illustrations):

Along one canvas edge, place a vertical column of micro-text (8px) reading rotated 90°:

  {

    desc: 'フェミニン・ロマンティック・ファッション誌的なおしゃれさ',
    fontBlock: `[Typography — Girly / Feminine]

    designBlock: `[Design direction — Girly]

Each slightly angled (−15° to +15°), tinted in dusty rose or muted lavender at 40–50% opacity.

Trailing from 2–3 diagonal keywords, add a diminishing scatter of tiny glyphs — ✦ ✧ · — decreasing in size and opacity as they trail away, as if the word is leaving a sparkling wake.

function makeChips(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.label;
    Object.assign(chip.dataset, {
      desc: item.desc,
      fontBlock: item.fontBlock,
      bgBlock: item.bgBlock,
      designBlock: item.designBlock
    });
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      updatePreview();
    };
    el.appendChild(chip);
  });
}

makeChips('taste-grid', tastes);

let lastPrompt = '';

function generate() {
  const name     = document.getElementById('inp-name').value.trim() || 'me';
  const rawKw    = document.getElementById('inp-keywords').value.trim();
  const rawColor = document.getElementById('inp-color').value.trim();

  const kwList   = rawKw    ? rawKw.split(/\s+/).filter(Boolean) : ['design', 'my interests'];
  const colorStr = rawColor ? rawColor.split(/\s+/).filter(Boolean).join(', ') : 'colors that suit the overall style';

  const chip = document.querySelector('#taste-grid .chip.active');
  const { px, ratio: ratioLabel } = SIZE_PRESETS.portrait;

  const fontBlock   = chip ? chip.dataset.fontBlock   : '[Typography]\nUse a tasteful mix of Japanese gothic and Latin sans-serif fonts.';
  const bgBlock     = chip ? chip.dataset.bgBlock     : '[Background]\nUse a clean, simple background that does not compete with the typography.';
  const designBlock = chip ? chip.dataset.designBlock : '[Design direction]\nBalance visual energy with readability.';
  const tasteLabel  = chip ? chip.dataset.desc        : 'stylish and contemporary';

  lastPrompt = [
    `Create a text-only personal introduction typography poster. Render ONLY typographic elements — no illustrations, no human figures, no decorative imagery of any kind. Every pixel must be used for text or background only.`,
    ``,
    `[Canvas]`,
    `Size: ${px}`,
    `Aspect ratio: ${ratioLabel}`,
    ``,
    `[Overall mood & style]`,
    tasteLabel,
    ``,
    NAME_BLOCK(name),
    ``,
    fontBlock,
    ``,
    bgBlock,
    ``,
    `[Color palette]`,
    `Use: ${colorStr}`,
    `Apply these colors as fills on individual words or characters. Never use more than 4–5 distinct hues total.`,
    ``,
    `[Keywords to place on canvas]`,
    kwList.join(' · '),
    `Every keyword listed above MUST appear on the canvas. Do not omit any. Do not add words not listed here.`,
    ``,
    LAYOUT_BLOCK(),
    ``,
    CATCHPHRASE_BLOCK(kwList),
    ``,
    designBlock,
    ``,
    `[DALL-E rendering instructions]`,
    `- Render all text with crisp, sharp edges — no motion blur, no soft glows.`,
    `- The composition must fill the entire canvas edge-to-edge. No large empty corners.`,
    `- Output in portrait orientation. Do not add any border or frame.`
  ].join('\n');

  document.getElementById('output-box').textContent = lastPrompt;
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetAll() {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-keywords').value = '';
  document.getElementById('inp-color').value = '';
  document.querySelectorAll('#taste-grid .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('output-area').style.display = 'none';
  document.getElementById('output-box').textContent = '';
  document.getElementById('kw-preview').style.display = 'none';
  document.getElementById('kw-preview-inner').innerHTML = '';
  lastPrompt = '';
}

// サイズ階調をランダムに割り当て（隣接が同じにならないよう）
const SIZE_TIERS = [0.55, 0.75, 1.0, 1.35, 1.8];
function assignSizes(count) {
  const sizes = [];
  let prev = -1;
  for (let i = 0; i < count; i++) {
    let t;
    do { t = Math.floor(Math.random() * SIZE_TIERS.length); } while (t === prev);
    sizes.push(SIZE_TIERS[t]);
    prev = t;
  }
  return sizes;
}

function updatePreview() {
  const raw = document.getElementById('inp-keywords').value.trim();
  const preview = document.getElementById('kw-preview');
  const inner = document.getElementById('kw-preview-inner');
  const chip = document.querySelector('#taste-grid .chip.active');

  if (!raw || !chip) { preview.style.display = 'none'; return; }

  const taste = chip.textContent.trim();
  const cfg = TASTE_PREVIEW[taste];
  if (!cfg) { preview.style.display = 'none'; return; }

  const words = raw.split(/\s+/).filter(Boolean);
  const sizes = assignSizes(words.length);

  preview.style.display = 'block';
  preview.style.background = cfg.bg;
  preview.style.borderColor = cfg.border;

  inner.innerHTML = '';
  words.forEach((word, i) => {
    const font = cfg.fonts[i % cfg.fonts.length];
    const color = cfg.colors[i % cfg.colors.length];
    const baseSize = cfg.sizePx[i % cfg.sizePx.length];
    const finalSize = Math.round(baseSize * sizes[i]);
    const rot = cfg.rotations[i % cfg.rotations.length];
    const extra = cfg.extraStyle(i);

    const span = document.createElement('span');
    span.className = 'kw-token';
    span.textContent = word;
    span.style.cssText = `
      font-family: ${font.f};
      font-weight: ${font.w};
      font-size: ${finalSize}px;
      color: ${color};
      transform: rotate(${rot}deg);
      ${extra}
    `;
    inner.appendChild(span);
  });
}

function copyText(e) {
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const btn = e.target.closest('button');
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
