<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイポグラフィポスタープロンプトジェネレーター</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    max-width: 660px; margin: 0 auto; padding: 2rem 1.25rem;
    background: #fff; color: #111;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 0.4rem; }
  p.sub { font-size: 13px; color: #888; margin: 0 0 1.75rem; }
  .section { margin-bottom: 1.25rem; }
  .label {
    display: block; font-size: 12px; color: #555;
    font-weight: 500; margin-bottom: 6px;
  }
  .label span { font-weight: 400; color: #aaa; }
  input[type="text"], textarea {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid #e0e0e0; border-radius: 8px;
    background: #fff; color: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;

  }
  input[type="text"]:focus, textarea:focus { border-color: #888; }

    display: inline-flex; align-items: center; padding: 5px 14px;
    border-radius: 999px; font-size: 13px; cursor: pointer;
    border: 1px solid #ddd; background: #fff; color: #666;
    transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: #999; color: #111; }
  .chip.active { background: #111; color: #fff; border-color: #111; }  .gen-btn {
    margin-top: 1.5rem; padding: 11px 22px; font-size: 14px;
    font-weight: 500; cursor: pointer; border: none;
    border-radius: 8px; background: #111; color: #fff;
    font-family: inherit; transition: background 0.15s;
  }
  .gen-btn:hover { background: #333; }
  #output-area { display: none; margin-top: 1.75rem; }
  .output-label { font-size: 12px; color: #555; font-weight: 500; margin: 0 0 8px; }
  .output-label span { font-weight: 400; color: #aaa; }
  #output-box {
    background: #f7f7f7; border: 1px solid #e8e8e8; border-radius: 8px;
    padding: 1rem 1.25rem; font-size: 13px; line-height: 1.9; color: #222;
    white-space: pre-wrap; word-break: break-word;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .action-btn {
    font-size: 13px; padding: 7px 16px; cursor: pointer;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #111; font-family: inherit;
    transition: background 0.15s;
  }
  .action-btn:hover { background: #f4f4f4; }

  .section-divider {
    border: none; border-top: 1px solid #f0f0f0;
    margin: 1.5rem 0;
  }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    color: #bbb; text-transform: uppercase; margin: 0 0 1rem;
  }

</style>
</head>
<body>

<h1>タイポグラフィポスタープロンプトジェネレーター</h1>
<p class="sub">入力情報をもとにDALL-E向けの詳細プロンプトを生成します</p>

<p class="section-title">基本情報</p>

<div class="section">
  <label class="label">あなたの名前 / ニックネーム</label>
  <input id="inp-name" type="text" />
</div>

<div class="section">
  <label class="label">キーワード <span>スペース区切り・5〜15個推奨</span></label>
  <textarea id="inp-keywords"></textarea>
</div>

<hr class="section-divider">
<p class="section-title">スタイル</p>

<div class="section">
  <label class="label">テイスト <span>1つ選択</span></label>
  <div class="chip-group" id="taste-grid"></div>
</div>

<div class="section">
  <label class="label">使いたい色 <span>スペース区切り・色名やカラーコードも可</span></label>
  <input id="inp-color" type="text" />
</div>


<button class="gen-btn" onclick="generate()">プロンプトを生成する ↗</button>

<div id="output-area">
  <p class="output-label">生成されたプロンプト <span>— ChatGPT (DALL-E) にそのまま貼り付けてください</span></p>
  <div id="output-box"></div>
  <div class="btn-row">
    <button class="action-btn" onclick="copyText(event)">コピー</button>
    <button class="action-btn" onclick="window.open('https://chatgpt.com/', '_blank')">ChatGPTを開く ↗</button>
  </div>
</div>

<script>
// ─── 定数ブロック ──────────────────────────────────────────────

const SIZE_PRESETS = {
  portrait:  { px: '960 × 1280 px', ratio: '3:4 portrait' },
  square:    { px: '1080 × 1080 px', ratio: '1:1 square' },
  landscape: { px: '1280 × 960 px', ratio: '4:3 landscape' }
};

const DENSITY_INSTRUCTIONS = {
  dense:    'Pack keywords tightly so almost no canvas area is empty. Overlapping or very close placement is acceptable and encouraged.',
  balanced: 'Distribute keywords so they fill the canvas well with moderate breathing room between elements.',
  airy:     'Leave generous whitespace between keywords. Let negative space function as a design element.'
};

const CONTRAST_INSTRUCTIONS = {
  extreme:  'Use at least five drastically different size levels — enormous (headline-scale), large, medium, small, and micro (nearly illegible). The largest element should be at least 10× taller than the smallest. Push contrast to the limit.',
  strong:   'Use four clearly distinct size levels — very large, large, medium, and small. The largest element should be roughly 6× taller than the smallest. Size jumps should feel bold and intentional.',
  moderate: 'Use three size levels — large, medium, and small — with a comfortable hierarchy. Less chaos, more readability.'
};

const NAME_BLOCK = (name) =>
`[Name treatment]
The name "${name}" is the personal identifier of the poster owner and must be treated with typographic clarity:
- Set "${name}" at a medium-prominent size (roughly 1/5 of the canvas width) — larger than most keywords but not the single dominant element.
- Choose a font weight and style that reflects the overall taste of the poster.
- Place it at a natural anchor point in the composition (e.g. upper-left, lower-right, or center-stage) where it reads confidently without overpowering the surrounding keywords.
- Do NOT place it in isolation — let nearby keywords slightly overlap or orbit around it for integration.`;

const LAYOUT_BLOCK = (density, contrast) =>
`[Layout & composition rules]
${DENSITY_INSTRUCTIONS[density]}

Text direction — three modes, distributed unpredictably:
  (A) Horizontal (yokogumi): standard left-to-right.
  (B) Vertical (tategumi): strict top-to-bottom column — no rotation, no diagonal tilt whatsoever. Each character stacks directly below the previous.
  (C) Diagonal: rotated freely between −50° and +50° for horizontal-origin words only. NEVER apply diagonal rotation to a word set in tategumi.
Mix all three directions across every region of the canvas. No single direction should dominate more than 40% of the keywords.

Internal character size variation (MANDATORY for every keyword of 2+ characters):
Within every multi-character keyword, independently vary the font size of EACH individual character. This is not optional — every keyword must show visible internal size contrast. Rules:
  - Assign each character one of four distinct size tiers: enormous (150–200% of the word's base size), large (110–140%), small (60–80%), or micro (30–50%).
  - No two adjacent characters should share the same tier.
  - Example patterns (apply randomly, not the same pattern for every word):
      · 大→微→中→大 (large, micro, medium, large)
      · 微→大→微→大→微 (micro, large, micro, large, micro)
      · 中→大→微→中 (medium, large, micro, medium)
  - The internal jump must be clearly visible even from a distance — subtle shifts do not qualify.
  - Vertical tategumi words must also apply this per-character size variation along the vertical axis; each stacked character has its own size.
  - This per-character size variation stacks on top of the global word-level size contrast — a word that is globally "small" still has internal character size jumps within it.

Global size contrast:
${CONTRAST_INSTRUCTIONS[contrast]}
Distribute size levels randomly — do not cluster all large words at center or all small words at edges.

Collision and layering:
Allow keywords to overlap slightly at edges. Use z-ordering so smaller words appear to slip behind larger ones. No word should be completely obscured.`;

function CATCHPHRASE_BLOCK(kwList) {
  const count = Math.max(1, Math.round(kwList.length * 0.3));
  return `[Catchphrase accents]
From the keyword list, select exactly ${count} keyword${count > 1 ? 's' : ''} (roughly 30% of the total) that best capture the person's character or passions.

CRITICAL LANGUAGE RULE: Every single catchphrase MUST be written entirely in Japanese. Use hiragana, katakana, and/or kanji ONLY. The use of any English letters, romaji, or Latin characters in a catchphrase is strictly forbidden — even a single letter is a violation.

For each selected keyword, compose a short Japanese-language catchphrase (8〜16文字) in one of these styles:
  - 詩的な一言: 短く詩的な表現（例：「静かに、でも確かに」「光を追いかけて」）
  - 座右の銘風: 自分の信念を表すフレーズ（例：「丁寧に生きる」「好きを貫く」）
  - 編集的キャプション: 雑誌の見出し風（例：「感性という名の羅針盤」「余白に宿る豊かさ」）

Placement and styling:
- Place each catchphrase as small accent text (roughly 60–70% the size of its paired keyword), positioned directly beside or below it.
- Style catchphrases differently from the main keywords: use extra-light weight, or a contrasting font family (e.g. a mincho caption next to a bold gothic headline).
- Leave the remaining ${kwList.length - count} keyword${kwList.length - count !== 1 ? 's' : ''} without catchphrases — they stand alone as pure typographic elements.`;
}

    bgBlock: `[Background — Girly]

    designBlock: `[Design direction — Girly]

    bgBlock: `[Background — Pop]

    bgBlock: `[Background — Retro]
Background color: aged warm paper — muted sepia (#F2E8D5), worn cream (#EDE0C8), or faded manila (#E8DEC0). The tone should feel like a page torn from a 1960s magazine or a vintage postal document.
Texture: apply a subtle noise grain at 10–15% opacity — enough to simulate aged paper without overwhelming the typography. A faint foxing or yellowing gradient at the very edges (≤5% opacity) adds period-appropriate aging.`,
    designBlock: `[Design direction — Retro]
Color strategy: sepia, cream, faded ink colors. Use deep brown or aged black for primary text — never pure #000000 (too digital). Accent colors should be vintage: brick red, faded olive, dusty teal, or aged gold.

Typographic embellishments (あしらい) — all text-based, no illustrations:
  • Scatter 4–6 vintage ornamental glyphs — ⁂ ✦ ※ ◉ ★ ☆ — at varied sizes across the canvas. These should feel like printer's marks or compositor's ornaments from a letterpress shop, not decorative icons.
  • Add 3–4 thin ruled lines made of repeated typewriter characters — e.g. ─────── or ═══════ or ·········· — as horizontal dividers between keyword zones. Give them slight misalignment or irregularity to mimic imprecise manual typesetting.
  • Around 2–3 keywords, add a vintage stamp or label frame: a rectangle of repeated characters — e.g. ▪▪▪▪▪▪▪▪ top and bottom with │ sides — that evokes a printed border from an old postal label or newspaper classified ad.
  • Use 2–3 ALL-CAPS filler text fragments in Special Elite at small size — e.g.「VOL.01」「EST.——」「NO.」— placed as editorial bylines or publication markers, as if this poster is a page from a vintage periodical.
  • Add 1–2 DotGothic16 vertical text strips spelling out a repeated short Japanese phrase — e.g.「かつて・いつか・また」— at micro size running alongside a large Zen Old Mincho word, creating a retro-digital texture contrast.

Mood reference: a 1960s newspaper typographic spread, a mid-century travel poster, a hand-assembled zine, a vintage band flyer. The mix of vertical Japanese tategumi, diagonal vintage display, and horizontal typewriter text should feel like a nostalgic collage — each element from a different era, unified by the aged palette.`
  }
];

// ─── UI初期化 ────────────────────────────────────────────────

function makeChips(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.label;
    Object.assign(chip.dataset, {
      hint: item.hint,
      desc: item.desc,
      fontBlock: item.fontBlock,
      bgBlock: item.bgBlock,
      designBlock: item.designBlock
    });
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    el.appendChild(chip);
  });
}

makeChips('taste-grid', tastes);

// ─── プロンプト生成 ───────────────────────────────────────────

let lastPrompt = '';

function generate() {
  const name     = document.getElementById('inp-name').value.trim() || 'me';
  const rawKw    = document.getElementById('inp-keywords').value.trim();
  const rawColor = document.getElementById('inp-color').value.trim();

  // 固定設定
  const density  = 'dense';
  const contrast = 'extreme';
  const ratio    = 'portrait';

  const kwList   = rawKw    ? rawKw.split(/\s+/).filter(Boolean)    : ['design', 'my interests'];
  const colorStr = rawColor ? rawColor.split(/\s+/).filter(Boolean).join(', ') : 'colors that suit the overall style';

  const chip = document.querySelector('#taste-grid .chip.active');
  const { px, ratio: ratioLabel } = SIZE_PRESETS[ratio];

  const fontBlock   = chip ? chip.dataset.fontBlock   : defaultFont();
  const bgBlock     = chip ? chip.dataset.bgBlock     : defaultBg();
  const designBlock = chip ? chip.dataset.designBlock : defaultDesign();
  const tasteLabel  = chip ? chip.dataset.desc        : 'stylish and contemporary';

  lastPrompt = [
    `Create a text-only personal introduction typography poster with the following detailed specifications. Render ONLY typographic elements — no illustrations, no human figures, no decorative imagery of any kind. Every pixel of the canvas must be used for text or background only.`,
    ``,
    `[Canvas]`,
    `Size: ${px}`,
    `Aspect ratio: ${ratioLabel}`,
    ``,
    `[Overall mood & style]`,
    tasteLabel,
    ``,
    NAME_BLOCK(name),
    ``,
    fontBlock,
    ``,
    bgBlock,
    ``,
    `[Color palette]`,
    `Use: ${colorStr}`,
    `Apply these colors as fills on individual words or characters. The background color should come from or harmonize with this palette. Never use more than 4–5 distinct hues in total across the composition.`,
    ``,
    `[Keywords to place on canvas]`,
    kwList.join(' · '),
    `Every keyword listed above must appear on the canvas. Do not omit any. Do not add words not listed here.`,
    ``,
    LAYOUT_BLOCK(density, contrast),
    ``,
    CATCHPHRASE_BLOCK(kwList),
    ``,
    `[DALL-E rendering instructions]`,
    `- Render all text with crisp, sharp edges — no motion blur, no soft glows.`,
    `- Ensure every word is fully legible at its intended size. Extremely small words may sacrifice readability for effect, but most keywords should be readable.`,
    `- The composition must fill the entire canvas edge-to-edge. No large empty corners.`,
    `- Output in portrait orientation as specified. Do not add any border or frame.`
  ].filter(line => line !== null).join('\n');

  document.getElementById('output-box').textContent = lastPrompt;
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function defaultFont() {
  return `[Typography]\nUse a tasteful mix of Japanese gothic and Latin sans-serif fonts. Mix weights and styles freely.`;
}
function defaultBg() {
  return `[Background]\nUse a clean, simple background that does not compete with the typography.`;
}
function defaultDesign() {
  return `[Design direction]\nBalance visual energy with readability. Let typography be the sole design element.`;
}

function copyText(e) {
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const btn = e.target.closest('button');
    const orig = btn.textContent;
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>
