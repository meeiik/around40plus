<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイポグラフィポスタープロンプトジェネレーター</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f4;
      --bg3: #f0efed;
      --text: #1c1c1a;
      --text2: #6b6b68;
      --text3: #a1a19e;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #272724;
        --bg3: #2e2e2b;
        --text: #f0ede8;
        --text2: #a1a19e;
        --text3: #6b6b68;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 2rem;
    }

    .fields {
      display: grid;
      gap: 1.25rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
    }

    label span {
      font-weight: 400;
      color: var(--text3);
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--text);
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .chip.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .font-hint {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--text3);
      min-height: 1.4em;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      transition: background 0.15s;
    }

    button:hover {
      background: var(--bg2);
    }

    button.primary {
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    button.primary:hover {
      opacity: 0.85;
    }

    button.ghost {
      font-weight: 400;
      background: transparent;
      color: var(--text2);
    }

    .output-area {
      display: none;
      margin-top: 1.5rem;
    }

    .output-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .output-label span {
      font-weight: 400;
    }

    .output-box {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .output-actions button {
      font-size: 13px;
      padding: 7px 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>タイポグラフィポスタープロンプトジェネレーター</h1>
    <p class="subtitle">情報を入力してChatGPT用プロンプトを生成します</p>

    <div class="fields">
      <div>
        <label for="inp-name">あなたの名前 / ニックネーム</label>
        <input id="inp-name" type="text" />
      </div>
      <div>
        <label for="inp-keywords">キーワード <span>スペース区切り</span></label>
        <textarea id="inp-keywords"></textarea>
      </div>
      <div>
        <label>テイスト <span>1つ選択</span></label>
        <div id="taste-grid" class="chip-grid"></div>
        <p id="font-hint" class="font-hint"></p>
      </div>
      <div>
        <label for="inp-color">使いたい色 <span>スペース区切り</span></label>
        <input id="inp-color" type="text" />
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="generate()">プロンプトを生成する ↗</button>
      <button class="ghost" onclick="resetAll()">リセット</button>
    </div>

    <div id="output-area" class="output-area">
      <p class="output-label">生成されたプロンプト <span>— ChatGPTにそのまま貼り付けてください</span></p>
      <div id="output-box" class="output-box"></div>
      <div class="output-actions">
        <button onclick="copyText(event)"><i class="ti ti-copy" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>コピー</button>
        <button onclick="window.open('https://chatgpt.com/','_blank')"><i class="ti ti-external-link" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>ChatGPTを開く</button>
      </div>
    </div>
  </div>

  <script>
const GLOBAL_SIZE_DENSITY = `[Global Size Jump Rate — applies to ALL keywords]
- BETWEEN keywords: use at least 5 dramatically different size levels across the composition:
  · XL: 320–400px (1–2 keywords that dominate entire sections)
  · L:  160–220px (3–4 keywords, clearly large and bold)
  · M:  70–100px  (several keywords, readable at a glance)
  · S:  30–45px   (supporting words, small but legible)
  · XS: 14–20px   (tiny accent words, almost whispered)
  The jump between XL and XS must feel shocking — like shouting next to a whisper
- WITHIN each keyword: vary the size of individual characters dramatically:
  · At least one character should be 2–4x larger than its neighbors within the same word
  · Characters can jump from large to tiny and back within a single word
  · This internal size variation must be clearly visible and intentional, not subtle
- DENSITY: the canvas must feel FULL and TYPE-FORWARD — text is the hero
  · No more than 15% of the canvas should be empty background
  · Words overlap, interlock, and layer throughout the entire composition
  · Background color/texture is almost entirely hidden behind typography`;

const tastes = [
  {
    label: "ナチュラル",
    val: "natural, organic, handmade and earthy",
    fontJa: "手書き風・丸ゴシック・やわらかいゴシック",
    fontEn: "exclusively handwritten or brush-lettered fonts for XL and L size words; rounded gothic (e.g. Zen Maru Gothic) for M size words; loose casual sans-serif for S and XS words — NO clean geometric or serif fonts; everything must feel hand-touched and imperfect",
    referenceEn: "Hand-illustrated botanical ZINE packed with text, nature journaling spread with dense handwritten notes, Scandinavian craft market poster — type fills every corner like pressed flowers covering a page.",
    layoutEn: `- Words are scattered and packed densely across the full canvas — hand-scattered, as if poured onto the page
- Each word tilts at a slightly different angle: horizontal words tilt ±5–15°, diagonal words go up to ±35°, vertical-leaning words lean top-to-bottom with a slight wobble (±5–10°)
- NO rigid vertical tategumi columns — instead vertical words feel like long brushstrokes running downward at a gentle lean
- Words overlap and crowd each other throughout — no large empty zones anywhere
- Within each keyword: character sizes vary like uneven brushwork — first or last character often 2–3x larger than the others`,
    colorEn: `- Primary text: deep warm brown (#3B2F2F) — never pure black
- Accent 1: dusty sage green (#8A9E7A) for 2–3 large keywords
- Accent 2: terracotta or clay red (#C16A4F) for 1–2 keywords
- Small XS words: warm off-white or parchment (they recede but still visible against the background)
- Colors look hand-applied and slightly uneven — not flat digital fills`,
    illustStyle: "loose hand-drawn ink sketch style — wobbly lines, imperfect fills, botanical/organic feel"
  },
  {
    label: "ガーリー",
    val: "girly, feminine, romantic and fashion-forward",
    fontJa: "スクリプト体・極細ゴシックの激しいコントラスト",
    fontEn: "two font styles used in extreme contrast: (1) flowing cursive script fonts for XL and L size keywords — sweeping, looping, expressive; (2) ultra-thin hairline gothic or sans-serif for M, S, and XS keywords — the violent contrast between lush script and razor-thin gothic IS the design's identity; mix both styles throughout the dense composition",
    referenceEn: "Densely typeset Korean fashion magazine spread, packed Parisian editorial layout, personal brand zine with text covering every inch — type is wallpaper.",
    layoutEn: `- Canvas is packed densely — words fill every zone, overlapping and layering like magazine clippings glued together
- Mix horizontal (40%), vertical tategumi (30%), diagonal (30%) — all directions crowd the same areas
- The extreme contrast between huge flowing script words and tiny hairline gothic words must be unmissable
- Typographic ornaments (✳ ✿ † ◇ ·) are scattered throughout to fill gaps between words — used as mortar between bricks
- Within each script keyword: characters flow at wildly varying heights; within gothic keywords: vary size per character dramatically
- No empty zones — every corner and edge of the canvas is occupied`,
    colorEn: `- XL script words: blush pink (#E8A0A8) or deep rose (#8C4A5A)
- L script words: muted mauve (#8C4A5A)
- M thin gothic words: soft lavender (#B8A9D4)
- S and XS words + ornaments: pale gold (#D4AF7A)
- Layer colors so the composition feels richly colored throughout`,
    illustStyle: "delicate fine-line illustration style — thin pen strokes, soft watercolor wash, romantic and feminine"
  },
  {
    label: "ポップ",
    val: "pop, colorful, bold and energetic",
    fontJa: "極太ゴシック・ポップ体・デザイン書体",
    fontEn: "extra-bold gothic, pop display fonts, expressive design typefaces — loud, punchy, high-impact",
    referenceEn: "90s street flyer with zero empty space, Harajuku fashion zine packed wall-to-wall with text, Tokyo concert poster where type is the image.",
    layoutEn: `- Absolute maximum chaos and density — words crash, collide, and overlap aggressively everywhere
- Equal mix of horizontal (35%), vertical tategumi (35%), diagonal up to ±60° (30%)
- Within each keyword: one character enormous, the next tiny, next large — ransom-note internal variation
- Some words outlined only, others solid fill, others with drop shadow — vary per word
- The canvas must be so full that the background is barely visible in any zone`,
    colorEn: `- 4–5 saturated clashing colors: vivid red (#FF2D2D), electric blue (#0057FF), bright yellow (#FFE600), hot pink (#FF4DA6), lime green (#39FF14)
- Apply per word or per character — adjacent words clash in color
- Black or white outlines separate the clashing colors`,
    illustStyle: "bold flat-color cartoon style — thick outlines, solid fills, sticker-like, high contrast and playful"
  },
  {
    label: "エレガント",
    val: "elegant, ultra-refined, austere and luxurious",
    fontJa: "極細明朝体・ヘアライン一択（太字禁止）",
    fontEn: "exclusively ultra-thin or hairline weight mincho (Japanese serif) and classic Latin serif fonts — NO bold, NO medium weight anywhere; thinness IS elegance; but use dramatically varied sizes to create visual power despite the thin weight",
    referenceEn: "Densely layered Celine campaign typography, stacked art museum poster with many text elements, high-fashion editorial where thin type fills the frame completely.",
    layoutEn: `- Despite being elegant, the canvas is DENSE — thin words stack, layer, and overlap throughout
- Vertical tategumi words dominate (55%): tall thin columns of characters crowd the canvas like a forest of reeds
- Horizontal words (35%): set with extreme letter-spacing, often all-caps Latin, but many of them layered together
- Diagonal (10%): very subtle tilt ±5–8°, used sparingly but present
- Words overlap at edges and layer in depth — foreground words are darker/stronger, background words are lighter/ghosted
- Within each keyword: characters are the same size (elegance = consistency) BUT the jump between different keywords is extreme — an XL word next to an XS word, with no medium transition
- The overall impression: a dense forest of hairline type, dramatic in scale contrast but unified in extreme thinness`,
    colorEn: `- If dark background: XL and L words in warm ivory (#F5F0E8); 2–3 keywords in antique gold (#C9A84C); ghosted background words in very dark grey (#333333)
- If light background: XL and L in deep charcoal (#1A1A1A); 2 keywords in dark navy (#1B2A4A); ghosted words in light grey (#CCCCCC)
- Maximum 3 colors — but use opacity/ghosting to create depth and layers`,
    illustStyle: "ultra-minimal hairline engraving style — single continuous thin lines, no fills, resembling antique copperplate etching"
  },
  {
    label: "レトロ",
    val: "retro, vintage, nostalgic",
    fontJa: "レトロフォント・タイプライター風・ヴィンテージ系",
    fontEn: "retro display fonts, typewriter-inspired typefaces, vintage condensed fonts — aged, characterful, nostalgic",
    referenceEn: "Packed Showa-era weekly magazine page, vintage poster covered wall-to-wall with type, hand-typed zine with no wasted space.",
    layoutEn: `- Dense, packed layout — every inch filled like a vintage print page with no wasted space
- Mix horizontal typewriter lines (40%), vertical tategumi newspaper columns (35%), diagonal cut-paste clippings (25%)
- Within each keyword: mismatched character sizes like different letterpress type blocks — irregular and dramatic
- Text-based ornaments: ———, *, [ ], ALL CAPS labels fill every gap
- Words overlap and crowd — the page should feel overset, like too much content forced into too little space`,
    colorEn: `- Primary: dark sepia brown (#3D2B1F) or aged black (#2C2416)
- Accent 1: vermillion/brick red (#B33A2A) — rubber stamp effect on 2–3 headline words
- Accent 2: mustard yellow (#C9A84C) for 1–2 keywords
- Accent 3: faded teal/olive (#5C7A6A) subtle third tone
- All colors faded/desaturated — aged by sunlight`,
    illustStyle: "vintage woodblock print or letterpress style — rough edges, ink texture, aged and faded tones"
  },
];

const namePlacements = [
  "Place the name in the upper-left area, set horizontally, woven into the dense composition.",
  "Place the name near the center-right, set vertically (tategumi), running within the dense vertical text.",
  "Place the name in the lower-third, set horizontally, anchoring the dense composition like a signature.",
  "Place the name diagonally across the upper-right, slightly tilted, overlapping surrounding keywords.",
  "Place the name near the center, broken across two lines, interlocking with surrounding keywords.",
  "Place the name along the left edge, set vertically, acting as a spine within the dense composition.",
  "Place the name in the lower-right corner, horizontal, like an artist's signature almost buried in type.",
  "Place the name in the upper-center, horizontal, as the first anchor point in the dense composition.",
];

const visualWeights = [
  "Concentrate the XL and L text in the upper-left; S and XS text fills the lower-right — but all zones are dense.",
  "Concentrate the XL and L text in the lower-right; upper-left has dense S and XS text.",
  "Anchor XL text along a diagonal axis upper-left to lower-right; other sizes fill remaining zones densely.",
  "Center the XL elements in the middle; surround them densely with M, S, and XS words radiating outward.",
  "Push XL and L elements to the bottom half; top half densely packed with M and S words.",
  "Scatter all size levels evenly but with a slight concentration of XL toward the left side.",
  "Two clusters of XL text — upper-right and lower-left — with dense M and S words filling between them.",
  "XL elements accumulate along the right edge; left side densely filled with M and S words.",
];

const layoutVariants = [
  "Let the largest XL keyword burst out of the canvas edges, cropped deliberately — too big to contain.",
  "Stack several keywords in tight overlapping vertical columns on one side, crowding into scattered words on the other.",
  "One enormous XL word spans nearly the full canvas width as a background layer behind other words.",
  "Some keywords arranged in a loose spiral, with other words filling all gaps densely.",
  "A dense horizontal band of large text cuts across the middle, with packed words above and below.",
  "Cluster 4–5 keywords in a tight overlapping group in one corner, rest packed freely across the canvas.",
  "One keyword used as a long diagonal stripe cutting corner to corner, with dense words filling around it.",
  "One keyword repeated as a background texture layer, with primary keywords layered densely on top.",
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function parseColorToHex(colorStr) {
  const s = colorStr.trim();
  if (/^#([0-9a-fA-F]{3}){1,2}$/.test(s)) {
    let hex = s.slice(1);
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    return hex;
  }
  const ctx = document.createElement('canvas').getContext('2d');
  ctx.fillStyle = s;
  const resolved = ctx.fillStyle;
  if (/^#[0-9a-fA-F]{6}$/.test(resolved)) return resolved.slice(1);
  return null;
}

function lightenHex(hex, amount) {
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  const lr = Math.round(r + (255 - r) * amount);
  const lg = Math.round(g + (255 - g) * amount);
  const lb = Math.round(b + (255 - b) * amount);
  return '#' + [lr, lg, lb].map(v => v.toString(16).padStart(2, '0')).join('');
}

function buildBgInstruction(colorList, tasteLabel) {
  if (!colorList.length) {
    const defaults = {
      "ナチュラル": "Warm ivory or unbleached paper tone (#FAF7F2) with a faint paper-grain texture. The background will be mostly hidden behind dense typography.",
      "ガーリー": "Very pale blush (#FDF0F3) or soft lavender (#F5F0FA) — almost entirely covered by dense typography.",
      "ポップ": "Pure white (#FFFFFF) or one vivid solid color from the palette. Flat, no gradients or textures — almost entirely covered by typography.",
      "エレガント": "Near-black charcoal (#1A1A1A) or very pale warm ivory (#FDFAF5) — one extreme only. Mostly covered by layered thin typography.",
      "レトロ": "Aged warm paper (#F2E8D5) with noise/grain texture — almost entirely covered by dense vintage-style typography.",
    };
    return defaults[tasteLabel] || "A subtle neutral background almost entirely covered by dense typography.";
  }
  const chosen = pick(colorList);
  const hex = parseColorToHex(chosen);
  if (!hex) return `A very pale tint of "${chosen}" — almost entirely covered by dense typography.`;
  const lightHex = lightenHex(hex, 0.80);
  return `A pale, washed-out tint of the user's chosen color "${chosen}" — use ${lightHex} as the background color (this is the original color lightened ~80% toward white). The background will be almost entirely covered by dense typography.`;
}

function makeChips() {
  const el = document.getElementById('taste-grid');
  tastes.forEach((item, i) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.label;
    chip.dataset.index = i;
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.getElementById('font-hint').textContent = '使用フォントの方向性：' + item.fontJa;
    };
    el.appendChild(chip);
  });
}

makeChips();

let lastPrompt = '';

function resetAll() {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-keywords').value = '';
  document.getElementById('inp-color').value = '';
  document.querySelectorAll('#taste-grid .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('font-hint').textContent = '';
  document.getElementById('output-area').style.display = 'none';
  document.getElementById('output-box').textContent = '';
  lastPrompt = '';
}

function generate() {
  const name = document.getElementById('inp-name').value.trim() || 'me';
  const rawKw = document.getElementById('inp-keywords').value.trim();
  const rawColor = document.getElementById('inp-color').value.trim();
  const kwList = rawKw ? rawKw.split(/\s+/).filter(Boolean) : ['design', 'my interests'];
  const colorList = rawColor ? rawColor.split(/\s+/).filter(Boolean) : [];
  const activeChip = document.querySelector('#taste-grid .chip.active');
  if (!activeChip) { alert('テイストを選択してください'); return; }
  const tc = tastes[activeChip.dataset.index];

  const userColorNote = colorList.length
    ? `The user has requested these colors be incorporated: ${colorList.join(', ')}. Blend them into the color scheme while keeping the overall mood intact.`
    : '';

  const bgInstruction = buildBgInstruction(colorList, tc.label);

  const illustCount = Math.max(1, Math.min(5, Math.round(kwList.length * 0.2)));
  const illustTargets = shuffle(kwList).slice(0, illustCount);

  const illustSection = `[Keyword Illustrations & Decorative Accents]
For exactly ${illustTargets.length} keyword(s) — "${illustTargets.join('", "')}" — add a small illustrative accent or decorative motif placed directly beside or beneath the keyword:
- Each illustration should visually represent or evoke the meaning of its specific keyword
- Size: small, roughly 40–80px, never larger than the keyword itself — it is a subtle accent, not a focal point
- Style: ${tc.illustStyle}
- Placement: tucked close to the keyword, either beside it or nestled just below — it should feel like a natural part of that keyword's typographic element
- All other keywords have NO illustration — text only`;

  // キャッチコピーを付けるキーワード数：全体の約4割（最低1つ）
  const catchphraseCount = Math.max(1, Math.round(kwList.length * 0.4));

  const seed = Math.floor(Math.random() * 99999);
  const namePlacement = pick(namePlacements);
  const visualWeight = pick(visualWeights);
  const layoutVariant = pick(layoutVariants);

  lastPrompt = `Generate an image of a personal introduction typography poster with the following specifications.

[Random Seed]
${seed} — use this as a creative seed to ensure this design is unique and different from any previous generation.

[Name]
${name}

[Size]
960px × 1280px (vertical / portrait)

[Style & Mood]
${tc.val}

[Visual Reference]
Design this poster in the spirit of: ${tc.referenceEn}

[Background]
${bgInstruction}

[Font Direction (Japanese + Latin mix)]
Use ${tc.fontEn}. Mix Japanese and Latin typefaces for rich typographic contrast suited to this mood.

[Keywords to include]
${kwList.join(', ')}

${GLOBAL_SIZE_DENSITY}

[Layout & Text Direction]
${tc.layoutEn}

[Name Placement]
The name "${name}" should be set at a medium size (roughly 1/5 of canvas width) — clearly readable within the dense composition.
${namePlacement}

[Visual Weight Distribution]
${visualWeight}

[Layout Variation]
${layoutVariant}

[Color Rules]
${tc.colorEn}
${userColorNote}

${illustSection}

[Catchphrases]
From the keyword list, select exactly ${catchphraseCount} keyword(s) — roughly 40% of the total — that best represent the person's character or interests. For those ${catchphraseCount} keywords only, pair each with a short punchy catchphrase (3–6 words). Place each catchphrase as small accent text directly beside or beneath its keyword, styled differently (italic, lighter weight, or contrasting font). All other keywords appear WITHOUT any catchphrase.

[Final Note]
- No photos or human figures — typography only (illustrations are allowed only for the ${illustTargets.length} keyword(s) listed above)
- Every keyword in the list must appear somewhere in the composition
- This design must look distinctly different from any other version generated with the same inputs`;

  document.getElementById('output-box').textContent = lastPrompt;
  document.getElementById('output-area').style.display = 'block';
  document.getElementById('output-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyText(e) {
  if (!lastPrompt) return;
  navigator.clipboard.writeText(lastPrompt).then(() => {
    const btn = e.target.closest('button');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check" style="font-size:15px;vertical-align:-2px;margin-right:4px;"></i>コピーしました';
    setTimeout(() => btn.innerHTML = orig, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = lastPrompt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
  </script>
